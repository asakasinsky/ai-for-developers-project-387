name: Lighthouse Audit with Agent

on:
  schedule:
    - cron: '0 23 * * *'  # 02:00 MSK
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @lhci/cli
      - name: Run Lighthouse
        run: |
          lhci collect --url=https://ai-for-developers-project-387-fq8e.onrender.com
          lhci upload --target=filesystem --outputDir=./lighthouse-report
      - name: Save report to repo
        run: |
          mkdir -p lighthouse-reports
          REPORT_DIR="lighthouse-reports/$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$REPORT_DIR"
          cp -r lighthouse-report/* "$REPORT_DIR/"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add lighthouse-reports/
          git diff --staged --quiet || git commit -m "chore: add lighthouse report $(date +%Y%m%d-%H%M%S)"
          git push
      - name: Run OpenCode Agent
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: |
            Analyze the latest Lighthouse report in ./lighthouse-report/ and compare it with previous reports in ./lighthouse-reports/.
            If metrics have degraded, create a GitHub issue with specific recommendations:
            - Which pages slowed down
            - Which resources became heavier
            - Where extra requests appeared
            - Specific actionable fixes
