name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install release-please
        run: npm install -g release-please

      - name: Run release-please
        run: release-please release-pr --config-file=release-please-config.json --repo-url=https://github.com/asakasinsky/ai-for-developers-project-387 --token=${{ secrets.RELEASE_PLEASE_TOKEN }}