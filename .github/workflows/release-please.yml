name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate Release PR
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          path: frontend
          monorepo-tags: false
          token: ${{ secrets.GITHUB_TOKEN }}